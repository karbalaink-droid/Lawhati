<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>تطبيق لوحتي الفني</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Cairo:wght@300;400;600;700&display=swap" rel="stylesheet">
    
    <style>
        /* إعدادات وتخصيص الألوان */
        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
            font-family: 'Cairo', sans-serif;
        }

        body {
            background-color: #0b0f19;
            color: #ffffff;
            min-height: 100vh;
            overflow-x: hidden;
        }

        /* 1. نافذة إهداء أمي العزيزة */
        .gift-overlay-mom {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: radial-gradient(circle, #193822 0%, #0a1f11 100%);
            z-index: 10000;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            text-align: center;
            padding: 20px;
            animation: fadeOutMain 1s ease-in-out 5s forwards;
        }

        .gift-card-mom {
            background: rgba(255, 255, 255, 0.05);
            padding: 40px;
            border-radius: 24px;
            border: 2px solid #2e7d32;
            box-shadow: 0 0 30px rgba(46, 125, 50, 0.3);
            max-width: 500px;
            transform: scale(0.9);
            animation: popIn 0.8s cubic-bezier(0.34, 1.56, 0.64, 1) forwards;
        }

        .gift-card-mom h1 {
            color: #81c784;
            font-size: 2.5rem;
            margin-bottom: 20px;
        }

        .gift-card-mom p {
            color: #e8f5e9;
            font-size: 1.2rem;
            line-height: 1.8;
        }

        /* 2. نافذة إهداء أبي الغالي */
        .gift-overlay-dad {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: radial-gradient(circle, #1c1c1e 0%, #000000 100%);
            z-index: 9999;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            text-align: center;
            padding: 20px;
            opacity: 0;
            visibility: hidden;
            animation: fadeInNext 1s ease-in-out 5s forwards, fadeOutMain 1s ease-in-out 10s forwards;
        }

        .gift-card-dad {
            background: rgba(255, 255, 255, 0.03);
            padding: 40px;
            border-radius: 24px;
            border: 2px solid #444446;
            box-shadow: 0 0 30px rgba(255, 255, 255, 0.05);
            max-width: 500px;
        }

        .gift-card-dad h1 {
            color: #ffffff;
            font-size: 2.5rem;
            margin-bottom: 20px;
            letter-spacing: 1px;
        }

        .gift-card-dad p {
            color: #d1d1d6;
            font-size: 1.2rem;
            line-height: 1.8;
        }

        /* 3. نافذة الاستبيان المتكامل الجديد */
        .survey-overlay {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(11, 15, 25, 0.95);
            z-index: 9998;
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 20px;
            opacity: 0;
            visibility: hidden;
            animation: fadeInNext 1s ease-in-out 10s forwards;
        }

        .survey-card {
            background: #151c2c;
            padding: 30px;
            border-radius: 20px;
            border: 1px solid #233049;
            max-width: 500px;
            width: 100%;
            text-align: center;
            box-shadow: 0 10px 40px rgba(0,0,0,0.5);
        }

        .survey-card h2 {
            color: #38bdf8;
            margin-bottom: 12px;
            font-size: 1.6rem;
        }

        .survey-card p {
            color: #94a3b8;
            font-size: 0.95rem;
            margin-bottom: 18px;
        }

        .survey-options {
            display: flex;
            flex-direction: column;
            gap: 10px;
            margin-bottom: 20px;
            max-height: 280px;
            overflow-y: auto;
            padding-right: 5px;
        }

        .option-btn {
            background: #1e293b;
            border: 1px solid #334155;
            color: #cbd5e1;
            padding: 11px 15px;
            border-radius: 12px;
            cursor: pointer;
            font-size: 0.95rem;
            transition: all 0.3s ease;
            text-align: right;
            display: flex;
            align-items: center;
            gap: 10px;
        }

        .option-btn:hover {
            border-color: #38bdf8;
            background: rgba(56, 189, 248, 0.05);
            color: #ffffff;
        }

        .option-btn.selected {
            background: #38bdf8;
            border-color: #38bdf8;
            color: #0b0f19;
            font-weight: 600;
        }

        .submit-survey-btn {
            background: #10b981;
            color: white;
            border: none;
            padding: 14px 30px;
            border-radius: 12px;
            font-size: 1.1rem;
            font-weight: 600;
            cursor: pointer;
            width: 100%;
            transition: background 0.3s;
            margin-top: 10px;
        }

        .submit-survey-btn:hover {
            background: #059669;
        }

        /* 4. واجهة التطبيق الرئيسية */
        .app-container {
            max-width: 1200px;
            margin: 0 auto;
            padding: 20px;
            opacity: 0;
            transition: opacity 1s ease;
        }

        .app-header {
            text-align: center;
            margin-bottom: 30px;
            padding-bottom: 20px;
            border-bottom: 1px solid #1e293b;
        }

        .app-header h1 {
            font-size: 2.2rem;
            color: #ffffff;
            margin-bottom: 5px;
        }

        .app-header p {
            color: #64748b;
            font-size: 1rem;
        }

        /* نظام التبويبات الفنية */
        .tabs-nav {
            display: flex;
            justify-content: center;
            gap: 10px;
            margin-bottom: 30px;
            background: #151c2c;
            padding: 8px;
            border-radius: 16px;
            border: 1px solid #233049;
        }

        .tab-link {
            background: transparent;
            border: none;
            color: #94a3b8;
            padding: 12px 24px;
            border-radius: 12px;
            cursor: pointer;
            font-size: 1.05rem;
            font-weight: 600;
            transition: all 0.3s ease;
            flex: 1;
            max-width: 200px;
        }

        .tab-link.active {
            background: #38bdf8;
            color: #0b0f19;
            box-shadow: 0 4px 15px rgba(56, 189, 248, 0.25);
        }

        .tab-content {
            display: none;
            animation: fadeIn 0.5s ease;
        }

        .tab-content.active {
            display: block;
        }

        /* تبويب 1: الدردشة الفنية والقرائية */
        .chat-wrapper {
            background: #151c2c;
            border-radius: 20px;
            border: 1px solid #233049;
            height: 550px;
            display: flex;
            flex-direction: column;
            overflow: hidden;
        }

        .chat-header {
            background: #1e293b;
            padding: 15px 20px;
            border-bottom: 1px solid #233049;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .chat-header-title h3 {
            color: #ffffff;
            font-size: 1.1rem;
        }

        .chat-header-title span {
            color: #10b981;
            font-size: 0.85rem;
            display: flex;
            align-items: center;
            gap: 5px;
        }

        .chat-messages {
            flex: 1;
            padding: 20px;
            overflow-y: auto;
            display: flex;
            flex-direction: column;
            gap: 15px;
        }

        .message {
            max-width: 75%;
            padding: 12px 18px;
            border-radius: 16px;
            line-height: 1.6;
            font-size: 1rem;
        }

        .message.bot {
            background: #1e293b;
            color: #e2e8f0;
            align-self: flex-start;
            border-bottom-right-radius: 4px;
        }

        .message.user {
            background: #38bdf8;
            color: #0b0f19;
            align-self: flex-end;
            border-bottom-left-radius: 4px;
            font-weight: 500;
        }

        .chat-input-area {
            padding: 15px 20px;
            background: #121824;
            border-top: 1px solid #233049;
            display: flex;
            gap: 12px;
        }
