<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>تطبيق لوحتي 🎨</title>
    <style>
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background-color: #f7f9fa;
            color: #333;
            text-align: center;
            padding: 50px 20px;
            margin: 0;
        }
        .container {
            max-width: 600px;
            background: white;
            padding: 30px;
            border-radius: 20px;
            box-shadow: 0 10px 20px rgba(0,0,0,0.05);
            margin: 0 auto;
        }
        h1 {
            color: #e91e63;
            font-size: 2.5rem;
        }
        p {
            font-size: 1.2rem;
            line-height: 1.8;
            color: #555;
        }
        .brush {
            font-size: 4rem;
            margin-bottom: 20px;
        }
    </style>
</head>
<body>

    <div class="container">
        <div class="brush">🎨✨</div>
        <h1>تطبيق لوحتي</h1>
        <p>مساحتك الخاصة ومرسمك مع رفيق الرسم للغوص في بحر الفن والإبداع.</p>
        <p>جاهزون لتنسيق ألوان الأكريليك والماركرز وتخيل اللوحات القادمة! 🖌️</p>
    </div>

</body>
</html>
